<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>আমার ওয়েবসাইট</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <img src="main_photo.jpg" alt="Main Photo" class="main-photo">

        <h1>স্বাগতম আমাদের ওয়েবসাইটে</h1>
        <p>সেরা ভিডিও এবং কন্টেন্ট দেখতে নিচের বাটনে ক্লিক করুন।</p>

        <button id="videoBtn" class="btn">ভিডিও দেখুন</button>

        <div id="hiddenSection" class="hidden">
            <div class="ad-box">
                <p>বিজ্ঞাপন লোড হচ্ছে...</p>
                </div>
            
            <h3>আপনার পছন্দের ছবি:</h3>
            <img src="ad_photo.jpg" alt="Clickable Photo" id="adPhoto" class="ad-photo">
            <p>(ছবির ওপর ক্লিক করলে বিজ্ঞাপন ওপেন হবে)</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
